name: Android APK (Gradle • no EAS)

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-24.04
    env:
      CI: true
      ANDROID_SDK_ROOT: /usr/local/lib/android/sdk
      ANDROID_HOME: /usr/local/lib/android/sdk

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      # Android SDK Pakete + Lizenzen (ohne pipefail, toleriert "yes: Broken pipe")
      - name: Install Android packages + accept licenses
        run: |
          set -eux
          SDKMAN="$ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager"
          if [ ! -x "$SDKMAN" ]; then
            SDKMAN="$(ls -d "$ANDROID_SDK_ROOT"/cmdline-tools/*/bin/sdkmanager | head -n1)"
          fi
          set +e
          yes | "$SDKMAN" --install \
            "platform-tools" "platforms;android-34" "build-tools;34.0.0" \
            "cmake;3.22.1" "ndk;27.1.12297006"
          yes | "$SDKMAN" --licenses
          set -e

      - name: Setup Node 18 (LTS)
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'yarn'

      - name: Install deps
        run: |
          set -eux
          corepack enable || true
          if [ -f yarn.lock ]; then
            yarn install --immutable || yarn install
          else
            npm ci || npm i
          fi

      - name: Ensure RN CLI present (install if missing)
        run: |
          set -eux
          node -e "try{require.resolve('@react-native-community/cli/package.json')}catch(e){process.exit(2)}"
          if [ $? -eq 2 ]; then
            if [ -f yarn.lock ]; then
              yarn add -D @react-native-community/cli @react-native-community/cli-platform-android
            else
              npm i -D @react-native-community/cli @react-native-community/cli-platform-android
            fi
          fi

      - name: Prebuild Android (idempotent)
        run: |
          set -eux
          npx expo prebuild -p android --non-interactive --no-install || true

      # Klarer JS-Bundle-Dry-Run -> falls Fehler, siehst du hier die echte JS/Metro-Message
      - name: Debug JS bundle (dry run)
        env:
          NODE_OPTIONS: --max-old-space-size=4096
        run: |
          set -eux
          node -v
          node -e "console.log('react-native =', require.resolve('react-native/package.json'))"
          node -e "console.log('cli          =', require.resolve('@react-native-community/cli/package.json'))"
          ENTRY="index.js"; [ -f index.tsx ] && ENTRY="index.tsx"; [ -f index.ts ] && ENTRY="index.ts"
          echo "Entry: $ENTRY"
          npx react-native bundle \
            --platform android \
            --dev false \
            --entry-file "$ENTRY" \
            --bundle-output /tmp/index.android.bundle \
            --assets-dest /tmp/app-assets

      - name: Gradle assembleRelease
        working-directory: android
        env:
          NODE_OPTIONS: --max-old-space-size=4096
        run: |
          set -eux
          ./gradlew :app:assembleRelease --no-daemon --stacktrace --info

      # Optionales Signieren – läuft nur, wenn Secrets vorhanden sind
      - name: Prepare keystore from secrets
        if: ${{ secrets.ANDROID_KEYSTORE_BASE64 != '' && secrets.ANDROID_KEY_ALIAS != '' && secrets.ANDROID_KEYSTORE_PASSWORD != '' && secrets.ANDROID_KEY_PASSWORD != '' }}
        run: |
          set -eux
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 -d > android/app/release.keystore
          {
            echo "MYAPP_UPLOAD_STORE_FILE=release.keystore"
            echo "MYAPP_UPLOAD_KEY_ALIAS=${{ secrets.ANDROID_KEY_ALIAS }}"
            echo "MYAPP_UPLOAD_STORE_PASSWORD=${{ secrets.ANDROID_KEYSTORE_PASSWORD }}"
            echo "MYAPP_UPLOAD_KEY_PASSWORD=${{ secrets.ANDROID_KEY_PASSWORD }}"
          } >> android/gradle.properties

      - name: Zipalign + Sign APK
        if: ${{ secrets.ANDROID_KEYSTORE_BASE64 != '' && exists('android/app/build/outputs/apk/release/app-release-unsigned.apk') }}
        run: |
          set -eux
          BUILD_DIR="android/app/build/outputs/apk/release"
          UNSIGNED="$BUILD_DIR/app-release-unsigned.apk"
          ALIGNED="$BUILD_DIR/app-release-aligned.apk"
          SIGNED="$BUILD_DIR/app-release-signed.apk"
          "$ANDROID_SDK_ROOT/build-tools/34.0.0/zipalign" -f -p 4 "$UNSIGNED" "$ALIGNED"
          "$ANDROID_SDK_ROOT/build-tools/34.0.0/apksigner" sign \
            --ks android/app/release.keystore \
            --ks-key-alias "${{ secrets.ANDROID_KEY_ALIAS }}" \
            --ks-pass env:ANDROID_KEYSTORE_PASSWORD \
            --key-pass env:ANDROID_KEY_PASSWORD \
            --out "$SIGNED" "$ALIGNED"
        env:
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}

      - name: Upload APK(s)
        uses: actions/upload-artifact@v4
        with:
          name: app-apk
          path: |
            android/app/build/outputs/apk/release/*.apk
            android/app/build/outputs/apk/release/*.aab
          if-no-files-found: warn
