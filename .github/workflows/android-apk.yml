name: Android APK (Gradle • no EAS)

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # Wichtig: KEIN setup-android Action. Wir nutzen das vorinstallierte SDK.
      - name: Export Android SDK env
        run: |
          echo "ANDROID_SDK_ROOT=/usr/local/lib/android/sdk" >> "$GITHUB_ENV"
          echo "ANDROID_HOME=/usr/local/lib/android/sdk" >> "$GITHUB_ENV"

      - name: Install Android packages + accept licenses
        run: |
          set -eux
          SDKMAN="$ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager"
          if [ ! -x "$SDKMAN" ]; then
            SDKMAN="$(ls -d "$ANDROID_SDK_ROOT"/cmdline-tools/*/bin/sdkmanager | head -n1)"
          fi

          # kein pipefail bei yes | sdkmanager (vermeidet SIGPIPE)
          set +o pipefail
          yes | "$SDKMAN" --install \
            "platform-tools" \
            "platforms;android-34" \
            "build-tools;34.0.0" \
            "cmake;3.22.1" \
            "ndk;26.1.10909125" \
            "ndk;27.1.12297006"
          yes | "$SDKMAN" --licenses
          set -o pipefail

      - name: Install deps
        run: |
          set -eux
          corepack enable || true
          if [ -f yarn.lock ]; then
            yarn install --frozen-lockfile
          elif [ -f package-lock.json ]; then
            npm ci
          else
            npm i
          fi

      - name: Prebuild Android (idempotent)
        run: |
          set -eux
          if [ ! -f android/gradlew ]; then
            npx expo prebuild --platform android --non-interactive || true
          fi

      - name: Debug JS bundle (dry run)
        continue-on-error: true
        run: |
          set -eux
          ENTRY="index.js"
          [ -f index.tsx ] && ENTRY="index.tsx"
          [ -f index.ts ]  && ENTRY="index.ts"
          echo "Entry file: $ENTRY"
          corepack enable || true
          node -v
          yarn -v || npm -v || true
          npx react-native bundle \
            --platform android \
            --dev false \
            --entry-file "$ENTRY" \
            --bundle-output /tmp/index.android.bundle \
            --assets-dest /tmp/app-assets \
            --config metro.config.js \
            2>&1 | tee /tmp/bundle-dryrun.log

      - name: Upload bundle dry-run log (always)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bundle-dryrun
          path: |
            /tmp/bundle-dryrun.log
            /tmp/index.android.bundle
            /tmp/app-assets
          if-no-files-found: ignore

      - name: Prepare keystore from secrets
        if: env.ANDROID_KEYSTORE_BASE64 != ''
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          set -eux
          mkdir -p android/app
          echo "$ANDROID_KEYSTORE_BASE64" | base64 -d > android/app/release.keystore
          {
            echo "MYAPP_UPLOAD_STORE_FILE=release.keystore"
            echo "MYAPP_UPLOAD_KEY_ALIAS=${{ secrets.ANDROID_KEY_ALIAS }}"
            echo "MYAPP_UPLOAD_STORE_PASSWORD=${{ secrets.ANDROID_KEYSTORE_PASSWORD }}"
            echo "MYAPP_UPLOAD_KEY_PASSWORD=${{ secrets.ANDROID_KEY_PASSWORD }}"
          } >> android/gradle.properties

      - name: Gradle assembleRelease
        env:
          NODE_OPTIONS: --max-old-space-size=4096
        working-directory: android
        run: |
          set -eux
          ./gradlew :app:assembleRelease --no-daemon --stacktrace --info

      - name: Upload APK/AAB
        uses: actions/upload-artifact@v4
        with:
          name: android-dist
          path: |
            android/app/build/outputs/apk/release/*.apk
            android/app/build/outputs/bundle/release/*.aab
          if-no-files-found: warn

      - name: Upload build logs (always)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          path: |
            android/app/build/outputs/**/*.log
            android/app/build/reports/**/*
          if-no-files-found: ignore
